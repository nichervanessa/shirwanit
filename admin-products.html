<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Products — Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── AUTH GATE — shown while checking login ── -->
  <div class="auth-gate" id="authGate">
    <div class="auth-gate-inner">
      <div class="big-spinner"></div>
      <p>Checking authentication…</p>
    </div>
  </div>

  <!-- ── LOGIN WALL — shown if not logged in ── -->
  <div class="auth-gate" id="loginWall" style="display:none">
    <div class="lookup-card" style="max-width:420px; margin:0 auto;">
      <h2 class="modal-title">Admin Login</h2>
      <p class="modal-sub">You must be signed in to manage products.</p>
      <div id="adminLoginError" class="login-error" style="display:none"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="adminEmail" placeholder="staff@company.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="adminPassword" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="primary-btn" onclick="adminLogin()">
        <span id="loginBtnText">Sign In</span>
        <div class="btn-spinner" id="loginSpinner" style="display:none"></div>
      </button>
      <p style="margin-top:1rem; text-align:center">
        <a href="products.html" style="color:#6366f1; text-decoration:none; font-size:0.875rem;">← Back to Products</a>
      </p>
    </div>
  </div>

  <!-- ── MAIN ADMIN UI ── -->
  <div id="adminUI" style="display:none">
    <nav class="nav">
      <div class="nav-inner">
        <a href="index.html" class="nav-logo">
          <div class="nav-logo-icon">
            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="4" y="10" width="32" height="22" rx="3" stroke="white" stroke-width="2.5"/>
              <path d="M4 17h32" stroke="white" stroke-width="2.5"/>
              <circle cx="10" cy="25" r="2" fill="white"/>
              <rect x="16" y="23" width="14" height="4" rx="1.5" fill="white"/>
            </svg>
          </div>
          <div>
            <div class="nav-logo-name">Admin Panel</div>
            <div class="nav-logo-sub">Manage Products</div>
          </div>
        </a>
        <div class="nav-links">
          <a href="products.html" class="nav-link">← View Products</a>
          <span id="adminUserEmail" style="font-size:0.8rem; color:#94a3b8; padding:0 0.5rem;"></span>
          <button class="ghost-btn" onclick="adminLogout()">Sign Out</button>
        </div>
      </div>
    </nav>

    <div class="container admin-container">

      <!-- ── ADD / EDIT FORM ── -->
      <div class="lookup-card admin-form-card">
        <h2 class="section-title" id="formTitle">Add New Product</h2>

        <div class="admin-form-grid">
          <!-- Left: details -->
          <div>
            <div class="form-group">
              <label>Product Name <span style="color:#ef4444">*</span></label>
              <input type="text" id="pName" placeholder="e.g. TP-Link Wireless Router AC1200" />
            </div>

            <div class="form-group">
              <label>Category <span style="color:#ef4444">*</span></label>
              <div class="admin-cat-grid">
                <label class="admin-cat-option">
                  <input type="radio" name="pCategory" value="internet" checked />
                  <span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
                    Internet
                  </span>
                </label>
                <label class="admin-cat-option">
                  <input type="radio" name="pCategory" value="solar" />
                  <span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg>
                    Solar
                  </span>
                </label>
                <label class="admin-cat-option">
                  <input type="radio" name="pCategory" value="camera" />
                  <span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
                    Camera
                  </span>
                </label>
              </div>
            </div>

            <div class="form-group">
              <label>Price (number only) <span style="color:#ef4444">*</span></label>
              <input type="number" id="pPrice" placeholder="e.g. 75000" min="0" step="any" inputmode="decimal" />
            </div>

            <div class="form-group">
              <label>Short Description</label>
              <input type="text" id="pShortDesc" placeholder="One-line summary shown on the card" maxlength="100" />
            </div>

            <div class="form-group">
              <label>Full Description</label>
              <textarea id="pFullDesc" rows="5" placeholder="Full product details, specs, warranty info…"></textarea>
            </div>

            <div class="form-group">
              <label class="admin-toggle-label">
                <input type="checkbox" id="pPublished" checked />
                Publish immediately (visible to public)
              </label>
            </div>
          </div>

          <!-- Right: image upload -->
          <div>
            <div class="form-group">
              <label>Product Images (max 10)</label>
              <div class="image-drop-zone" id="dropZone"
                onclick="document.getElementById('imageFileInput').click()"
                ondragover="onDragOver(event)"
                ondragleave="onDragLeave(event)"
                ondrop="onDrop(event)">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                <p>Click or drag images here</p>
                <small>JPG, PNG, WebP · Max 5 MB each</small>
              </div>
              <input type="file" id="imageFileInput" accept="image/*" multiple style="display:none" onchange="handleFileSelect(this.files)" />
            </div>

            <!-- Upload progress -->
            <div id="uploadProgress" style="display:none">
              <div class="admin-progress-bar"><div class="admin-progress-fill" id="progressFill"></div></div>
              <p id="progressLabel" style="font-size:0.8rem; color:#64748b; margin-top:4px;">Uploading…</p>
            </div>

            <!-- Image preview grid -->
            <div class="admin-image-grid" id="imagePreviewGrid"></div>
          </div>
        </div>

        <!-- Form error -->
        <div class="login-error" id="formError" style="display:none; margin-top:1rem;"></div>

        <!-- Action buttons -->
        <div class="admin-form-actions">
          <button class="ghost-btn" onclick="resetForm()">Cancel / Reset</button>
          <button class="primary-btn" id="saveBtn" onclick="saveProduct()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            <span id="saveBtnText">Save Product</span>
            <div class="btn-spinner" id="saveSpinner" style="display:none"></div>
          </button>
        </div>
      </div>

      <!-- ── EXISTING PRODUCTS TABLE ── -->
      <div class="admin-list-card">
        <div class="admin-list-header">
          <h2 class="section-title">Existing Products</h2>
          <div class="admin-list-filter">
            <button class="cat-tab active" data-cat="all" onclick="filterAdminList('all')">All</button>
            <button class="cat-tab" data-cat="internet" onclick="filterAdminList('internet')">Internet</button>
            <button class="cat-tab" data-cat="solar" onclick="filterAdminList('solar')">Solar</button>
            <button class="cat-tab" data-cat="camera" onclick="filterAdminList('camera')">Camera</button>
          </div>
        </div>

        <div class="loading-card" id="loadingAdminList">
          <div class="big-spinner"></div>
        </div>
        <div id="adminProductList"></div>
      </div>

    </div>
  </div>

  <script src="firebase-config.js"></script>
  <script src="i18n.js"></script>
  <script src="admin-products.js"></script>
</body>
</html>
